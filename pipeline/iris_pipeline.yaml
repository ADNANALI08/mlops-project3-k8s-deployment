# PIPELINE DEFINITION
# Name: iris-classification-pipeline
components:
  comp-evaluate-model:
    executorLabel: exec-evaluate-model
    inputDefinitions:
      artifacts:
        model_path:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        test_path:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
    outputDefinitions:
      parameters:
        Output:
          parameterType: NUMBER_DOUBLE
  comp-load-and-preprocess:
    executorLabel: exec-load-and-preprocess
    outputDefinitions:
      artifacts:
        test_path:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
        train_path:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
  comp-train-model:
    executorLabel: exec-train-model
    inputDefinitions:
      artifacts:
        train_path:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
    outputDefinitions:
      artifacts:
        model_path:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
deploymentSpec:
  executors:
    exec-evaluate-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - evaluate_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'scikit-learn'\
          \ 'numpy'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.16.0' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef evaluate_model(\n    test_path: Input[Artifact],\n    model_path:\
          \ Input[Artifact]\n) -> float:\n    import json, pickle\n    from sklearn.metrics\
          \ import accuracy_score\n    with open(test_path.path) as f:\n        data\
          \ = json.load(f)\n    with open(model_path.path, \"rb\") as f:\n       \
          \ clf = pickle.load(f)\n    acc = accuracy_score(data[\"y\"], clf.predict(data[\"\
          X\"]))\n    print(f\"Accuracy: {acc:.4f}\")\n    return acc\n\n"
        image: python:3.11
    exec-load-and-preprocess:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - load_and_preprocess
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'scikit-learn'\
          \ 'pandas' 'numpy'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.16.0' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef load_and_preprocess(\n    train_path: Output[Artifact],\n   \
          \ test_path: Output[Artifact]\n):\n    import json\n    from sklearn.datasets\
          \ import load_iris\n    from sklearn.model_selection import train_test_split\n\
          \    iris = load_iris()\n    X_train, X_test, y_train, y_test = train_test_split(\n\
          \        iris.data, iris.target, test_size=0.2, random_state=42\n    )\n\
          \    with open(train_path.path, \"w\") as f:\n        json.dump({\"X\":\
          \ X_train.tolist(), \"y\": y_train.tolist()}, f)\n    with open(test_path.path,\
          \ \"w\") as f:\n        json.dump({\"X\": X_test.tolist(), \"y\": y_test.tolist()},\
          \ f)\n    print(\"Data preprocessed successfully.\")\n\n"
        image: python:3.11
    exec-train-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - train_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'scikit-learn'\
          \ 'numpy'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.16.0' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef train_model(\n    train_path: Input[Artifact],\n    model_path:\
          \ Output[Artifact]\n):\n    import json, pickle\n    from sklearn.ensemble\
          \ import RandomForestClassifier\n    with open(train_path.path) as f:\n\
          \        data = json.load(f)\n    clf = RandomForestClassifier(n_estimators=100,\
          \ random_state=42)\n    clf.fit(data[\"X\"], data[\"y\"])\n    with open(model_path.path,\
          \ \"wb\") as f:\n        pickle.dump(clf, f)\n    print(\"Model trained\
          \ successfully.\")\n\n"
        image: python:3.11
pipelineInfo:
  name: iris-classification-pipeline
root:
  dag:
    tasks:
      evaluate-model:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-evaluate-model
        dependentTasks:
        - load-and-preprocess
        - train-model
        inputs:
          artifacts:
            model_path:
              taskOutputArtifact:
                outputArtifactKey: model_path
                producerTask: train-model
            test_path:
              taskOutputArtifact:
                outputArtifactKey: test_path
                producerTask: load-and-preprocess
        taskInfo:
          name: evaluate-model
      load-and-preprocess:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-load-and-preprocess
        taskInfo:
          name: load-and-preprocess
      train-model:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-train-model
        dependentTasks:
        - load-and-preprocess
        inputs:
          artifacts:
            train_path:
              taskOutputArtifact:
                outputArtifactKey: train_path
                producerTask: load-and-preprocess
        taskInfo:
          name: train-model
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.0
