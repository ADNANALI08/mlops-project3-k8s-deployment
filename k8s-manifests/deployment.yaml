apiVersion: apps/v1
kind: Deployment
metadata:
  name: iris-classifier
  namespace: default
  labels:
    app: iris-classifier
spec:
  replicas: 3
  selector:
    matchLabels:
      app: iris-classifier
  template:
    metadata:
      labels:
        app: iris-classifier
    spec:
      containers:
      - name: iris-app
        image: python:3.11-slim
        command: ["python3", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  self.send_response(200)
                  self.send_header('Content-Type', 'application/json')
                  self.end_headers()
                  self.wfile.write(b'{"status":"iris-classifier running","model":"RandomForest","accuracy":1.0}')
              def do_POST(self):
                  self.send_response(200)
                  self.send_header('Content-Type', 'application/json')
                  self.end_headers()
                  self.wfile.write(b'{"predictions":[0]}')
              def log_message(self, *args): pass
          print("Server starting on port 8080")
          HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
